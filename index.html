<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>potato stuff</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0e0c0a;
      --surface: #1a1612;
      --border: #2e2820;
      --accent: #e8a135;
      --accent2: #c46b1a;
      --text: #f0e8d8;
      --muted: #7a6e60;
      --card-hover: #221e18;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Subtle grain overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 999;
      opacity: 0.4;
    }

    header {
      padding: 64px 48px 40px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 24px;
      flex-wrap: wrap;
    }

    .logo {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: clamp(2.4rem, 6vw, 4rem);
      letter-spacing: -0.03em;
      line-height: 1;
      color: var(--text);
    }

    .logo span {
      color: var(--accent);
    }

    .tagline {
      font-size: 0.72rem;
      color: var(--muted);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding-bottom: 6px;
    }

    main {
      padding: 48px;
      max-width: 1200px;
    }

    .section-label {
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .section-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
      max-width: 120px;
    }

    #grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1px;
      background: var(--border);
      border: 1px solid var(--border);
    }

    .card {
      background: var(--surface);
      padding: 28px;
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
      gap: 10px;
      position: relative;
      transition: background 0.2s ease;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 3px;
      height: 0;
      background: var(--accent);
      transition: height 0.25s ease;
    }

    .card:hover {
      background: var(--card-hover);
    }

    .card:hover::before {
      height: 100%;
    }

    .card-num {
      font-size: 0.6rem;
      color: var(--muted);
      letter-spacing: 0.15em;
    }

    .card-name {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 1.05rem;
      color: var(--text);
      line-height: 1.3;
    }

    .card-desc {
      font-size: 0.75rem;
      color: var(--muted);
      line-height: 1.6;
      flex: 1;
    }

    .card-arrow {
      font-size: 0.7rem;
      color: var(--accent);
      letter-spacing: 0.1em;
      margin-top: 4px;
      opacity: 0;
      transform: translateX(-4px);
      transition: opacity 0.2s ease, transform 0.2s ease;
    }

    .card:hover .card-arrow {
      opacity: 1;
      transform: translateX(0);
    }

    /* Empty state */
    .empty {
      grid-column: 1 / -1;
      padding: 80px 28px;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    .empty-icon {
      font-size: 2.5rem;
      margin-bottom: 8px;
      filter: grayscale(0.3);
    }

    .empty-title {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 1.1rem;
      color: var(--text);
    }

    .empty-sub {
      font-size: 0.72rem;
      color: var(--muted);
      line-height: 1.7;
      max-width: 340px;
    }

    .empty-sub code {
      color: var(--accent);
      background: rgba(232,161,53,0.08);
      padding: 1px 5px;
      border-radius: 3px;
    }

    /* Fade-in animation for cards */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card {
      animation: fadeUp 0.35s ease both;
    }

    footer {
      padding: 32px 48px;
      border-top: 1px solid var(--border);
      font-size: 0.62rem;
      color: var(--muted);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-top: 64px;
    }
  </style>
</head>
<body>

<header>
  <div>
    <div class="logo">potato<span>.</span>stuff</div>
  </div>
  <div class="tagline">personal project hub</div>
</header>

<main>
  <div class="section-label">projects</div>
  <div id="grid"></div>
</main>

<footer>
  potato-stuff.vercel.app &nbsp;·&nbsp; edit projects.json to add cards
</footer>

<script>
  async function loadProjects() {
    const grid = document.getElementById('grid');

    let projects = [];

    try {
      const res = await fetch('./projects.json');
      if (!res.ok) throw new Error('not found');
      projects = await res.json();
    } catch {
      // couldn't load JSON — show empty state
    }

    if (!projects.length) {
      grid.innerHTML = `
        <div class="empty">
          <div class="empty-icon">🥔</div>
          <div class="empty-title">nothing here yet</div>
          <div class="empty-sub">
            add your first project to <code>projects.json</code> and it'll show up here as a card.
          </div>
        </div>`;
      return;
    }

    projects.forEach((p, i) => {
      const a = document.createElement('a');
      a.className = 'card';
      a.href = p.url || '#';
      a.style.animationDelay = `${i * 0.05}s`;
      a.innerHTML = `
        <div class="card-num">${String(i + 1).padStart(2, '0')}</div>
        <div class="card-name">${p.name}</div>
        ${p.description ? `<div class="card-desc">${p.description}</div>` : ''}
        <div class="card-arrow">visit →</div>
      `;
      grid.appendChild(a);
    });
  }

  loadProjects();
</script>
</body>
</html>
